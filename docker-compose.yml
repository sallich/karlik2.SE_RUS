services:
  game-service:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: game-service
    ports:
      - "${HOST_PORT_GAME_SERVICE:-8080}:8080"
    environment:
      PORT: "8080"
      AGENT_RUNNER_URL: http://agent-runner:8082
      MOB_DECIDE_TIMEOUT_MS: ${MOB_DECIDE_TIMEOUT_MS:-8000}
      LLM_GUARD_DECISION_INTERVAL_MS: ${LLM_GUARD_DECISION_INTERVAL_MS:-6000}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 15s

  mcp-server:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: mcp-server
    ports:
      - "${HOST_PORT_MCP_SERVER:-8081}:8081"
    environment:
      PORT: "8081"
      GAME_SERVICE_URL: http://game-service:8080
    depends_on:
      game-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 20s

  # Ollama в Docker (опционально): docker compose --profile llm up
  ollama:
    profiles: [llm]
    image: ollama/ollama:latest
    ports:
      - "${HOST_PORT_OLLAMA:-11434}:11434"
    volumes:
      - ollama_models:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s

  ollama-pull:
    profiles: [llm]
    image: ollama/ollama:latest
    volumes:
      - ollama_models:/root/.ollama
    depends_on:
      ollama:
        condition: service_healthy
    restart: "no"
    entrypoint: ["/bin/sh", "-c", "ollama pull \"$$OLLAMA_MODEL\" && ollama pull \"$$OLLAMA_FALLBACK_MODEL\""]
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:3b}
      OLLAMA_FALLBACK_MODEL: ${OLLAMA_FALLBACK_MODEL:-qwen2.5:1.5b}

  agent-runner:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: agent-runner
    ports:
      - "${HOST_PORT_AGENT_RUNNER:-8082}:8082"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      PORT: "8082"
      LLM_PROVIDER: ${LLM_PROVIDER:-heuristic}
      LLM_API_KEY: ${LLM_API_KEY:-}
      YANDEX_FOLDER_ID: ${YANDEX_FOLDER_ID:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:3b}
      OLLAMA_FALLBACK_MODEL: ${OLLAMA_FALLBACK_MODEL:-qwen2.5:1.5b}
      LLM_REQUEST_TIMEOUT_MS: ${LLM_REQUEST_TIMEOUT_MS:-120000}
      LLM_FALLBACK_TIMEOUT_MS: ${LLM_FALLBACK_TIMEOUT_MS:-45000}
      AGENT_RETRY_ATTEMPTS: ${AGENT_RETRY_ATTEMPTS:-1}
      LLM_MAX_HISTORY_MESSAGES: ${LLM_MAX_HISTORY_MESSAGES:-16}
      OLLAMA_NUM_CTX: ${OLLAMA_NUM_CTX:-8192}
      OLLAMA_NUM_PREDICT: ${OLLAMA_NUM_PREDICT:-256}
      MOB_LLM_REQUEST_TIMEOUT_MS: ${MOB_LLM_REQUEST_TIMEOUT_MS:-12000}
      MOB_OLLAMA_NUM_PREDICT: ${MOB_OLLAMA_NUM_PREDICT:-64}
      MOB_OLLAMA_NUM_CTX: ${MOB_OLLAMA_NUM_CTX:-2048}
      USE_HEURISTIC_FALLBACK: ${USE_HEURISTIC_FALLBACK:-false}
      MCP_TRANSPORT: stdio
      MCP_SERVER_COMMAND: "/opt/mcp-server/bin/mcp-server stdio"
      GAME_SERVICE_URL: http://game-service:8080
      AGENT_MAX_TOOL_CALLS: ${AGENT_MAX_TOOL_CALLS:-500}
    depends_on:
      mcp-server:
        condition: service_healthy
      game-service:
        condition: service_healthy
      ollama-pull:
        condition: service_completed_successfully
        required: false
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8082/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s

  # Второй агент для сравнения (eval):
  #   docker compose --profile policy-agent up
  policy-agent-runner:
    profiles: [policy-agent]
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: policy-agent-runner
    ports:
      - "${HOST_PORT_POLICY_AGENT_RUNNER:-8083}:8083"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      PORT: "8083"
      # Policy-agent: по умолчанию Ollama (override: POLICY_LLM_PROVIDER=heuristic для baseline без LLM)
      LLM_PROVIDER: ${POLICY_LLM_PROVIDER:-ollama}
      LLM_API_KEY: ${LLM_API_KEY:-}
      YANDEX_FOLDER_ID: ${YANDEX_FOLDER_ID:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${POLICY_OLLAMA_MODEL:-${OLLAMA_MODEL:-qwen2.5:3b}}
      OLLAMA_FALLBACK_MODEL: ${POLICY_OLLAMA_FALLBACK_MODEL:-${OLLAMA_FALLBACK_MODEL:-qwen2.5:1.5b}}
      # 3b на CPU может отвечать >2 мин — не уходить на 1.5b слишком рано
      LLM_REQUEST_TIMEOUT_MS: ${POLICY_LLM_REQUEST_TIMEOUT_MS:-${LLM_REQUEST_TIMEOUT_MS:-180000}}
      LLM_FALLBACK_TIMEOUT_MS: ${POLICY_LLM_FALLBACK_TIMEOUT_MS:-${LLM_FALLBACK_TIMEOUT_MS:-60000}}
      AGENT_RETRY_ATTEMPTS: ${AGENT_RETRY_ATTEMPTS:-1}
      OLLAMA_NUM_CTX: ${POLICY_OLLAMA_NUM_CTX:-${OLLAMA_NUM_CTX:-8192}}
      OLLAMA_NUM_PREDICT: ${POLICY_OLLAMA_NUM_PREDICT:-${OLLAMA_NUM_PREDICT:-512}}
      USE_HEURISTIC_FALLBACK: ${USE_HEURISTIC_FALLBACK:-false}
      POLICY_STUCK_THRESHOLD: ${POLICY_STUCK_THRESHOLD:-3}
      POLICY_REPLAN_EVERY_STEPS: ${POLICY_REPLAN_EVERY_STEPS:-15}
      POLICY_STUCK_REPLAN_COOLDOWN: ${POLICY_STUCK_REPLAN_COOLDOWN:-8}
      POLICY_NO_PROGRESS_STEPS: ${POLICY_NO_PROGRESS_STEPS:-15}
      POLICY_COMBAT_STALL_STEPS: ${POLICY_COMBAT_STALL_STEPS:-35}
      POLICY_MACRO_CACHE: ${POLICY_MACRO_CACHE:-false}
      POLICY_LLM_INITIAL_TEMPERATURE: ${POLICY_LLM_INITIAL_TEMPERATURE:-0.75}
      POLICY_LLM_REPLAN_TEMPERATURE: ${POLICY_LLM_REPLAN_TEMPERATURE:-0.85}
      POLICY_LLM_TOP_P: ${POLICY_LLM_TOP_P:-0.92}
      POLICY_OLLAMA_KEEP_ALIVE: ${POLICY_OLLAMA_KEEP_ALIVE:-30m}
      POLICY_MAX_TOOL_CALLS: ${POLICY_MAX_TOOL_CALLS:-20000}
      POLICY_REQUIRE_LLM: ${POLICY_REQUIRE_LLM:-true}
      POLICY_INITIAL_LLM_ATTEMPTS: ${POLICY_INITIAL_LLM_ATTEMPTS:-5}
      POLICY_INITIAL_RETRY_DELAY_MS: ${POLICY_INITIAL_RETRY_DELAY_MS:-3000}
      MCP_TRANSPORT: stdio
      MCP_SERVER_COMMAND: "/opt/mcp-server/bin/mcp-server stdio"
      GAME_SERVICE_URL: http://game-service:8080
    depends_on:
      mcp-server:
        condition: service_healthy
      game-service:
        condition: service_healthy
      ollama:
        condition: service_healthy
        required: false
      ollama-pull:
        condition: service_completed_successfully
        required: false
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8083/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s

volumes:
  ollama_models:
